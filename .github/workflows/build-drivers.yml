name: Build drivers

# Cross-builds the whole suite - both UMDF drivers (VoidDisplay, VoidInput), the SDK
# (libvoidrv) and the CLI (voidctl) - for x64 and ARM64, Release only, in one job.
# InfVerif/ApiValidator off (flaky in CI) and SignMode=Off (no cert on the runner;
# release packages are signed separately with the real cert).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_idd12:
        description: 'Also build VoidDisplay IddCx 1.2 tier (Win10 1709 / Server 2019+)'
        type: boolean
        default: false
      build_idd10:
        description: 'Also build VoidDisplay IddCx 1.0 tier (Win10 1607 / Server 2016+)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    # windows-2022 = VS 2022 (v17), which matches WDK 26100's .17.0 driver build
    # tasks. windows-2025 was migrated to VS 2026 (v18) and needs WDK 28000's .18.0
    # tasks (MSB4062 'Microsoft.DriverKit.Build.Tasks.18.0.dll' not found) - a
    # mismatch with our 10.0.26100 target.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # The runner has VS2022 + Win11 SDK 10.0.26100 but not the WDK *content* (wdf\umdf
      # headers like wudfwdm.h / wdf.h). The choco package installs the wrong build
      # (22000); install the official WDK 26100 (matches VS2022's .17.0 build tasks and
      # the SDK 26100).
      - name: Install WDK 10.0.26100
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Join-Path $env:RUNNER_TEMP 'wdksetup.exe'
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/?linkid=2335869' -OutFile $exe
          Write-Host "Installing WDK (this downloads the payload)..."
          $p = Start-Process -FilePath $exe -ArgumentList '/quiet','/norestart','/ceip','off','/features','+' -Wait -PassThru
          Write-Host "wdksetup exit code: $($p.ExitCode)"

      - name: Diagnose WDK/SDK layout (non-fatal)
        shell: pwsh
        run: |
          $k = "${env:ProgramFiles(x86)}\Windows Kits\10"
          Write-Host "== Include\<ver> =="
          Get-ChildItem "$k\Include" -Directory -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }
          Write-Host "== wdf.h / wudfwdm.h locations =="
          Get-ChildItem $k -Recurse -Include 'wdf.h','wudfwdm.h' -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          Write-Host "== build targets =="
          Get-ChildItem "$k\build" -Recurse -Filter 'WindowsDriver.common.targets' -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }

      - name: Build all (x64/ARM64, Release)
        shell: pwsh
        run: |
          $failed = @()
          # Drivers first, then SDK, then CLI (voidctl references libvoidrv). The driver-
          # only props (SignMode/InfVerif/ApiValidator) are harmless no-ops for the SDK/CLI.
          $projects = @(
            'void-display\VoidDisplay.vcxproj',
            'void-input\VoidInput.vcxproj',
            'libvoidrv\libvoidrv.vcxproj',
            'voidctl\voidctl.vcxproj'
          )
          foreach ($plat in 'x64', 'ARM64') {
            foreach ($proj in $projects) {
              Write-Host "::group::Release | $plat | $proj"
              msbuild $proj /m `
                /p:Configuration=Release `
                /p:Platform=$plat `
                /p:SpectreMitigation=false `
                /p:SignMode=Off `
                /p:EnableInfVerif=false `
                /p:RunApiValidator=false `
                /v:minimal /nologo
              if ($LASTEXITCODE -ne 0) {
                Write-Host "::error::Build failed: Release $plat $proj"
                $failed += "Release/$plat/$proj"
              }
              Write-Host "::endgroup::"
            }
          }
          if ($failed.Count -gt 0) { throw ("Builds failed:`n" + ($failed -join "`n")) }

      # Older-OS VoidDisplay variants - only the IddCx driver has tiers (SDK/CLI/VoidInput
      # are version-agnostic). Manual-trigger only; outputs land in x64\Release_Idd12\ etc.
      - name: Build older-OS VoidDisplay tiers (manual)
        if: ${{ inputs.build_idd12 || inputs.build_idd10 }}
        shell: pwsh
        env:
          BUILD_IDD12: ${{ inputs.build_idd12 }}
          BUILD_IDD10: ${{ inputs.build_idd10 }}
        run: |
          $failed = @()
          $tiers = @()
          if ($env:BUILD_IDD12 -eq 'true') { $tiers += 12 }
          if ($env:BUILD_IDD10 -eq 'true') { $tiers += 10 }
          Write-Host "Building VoidDisplay tiers: $($tiers -join ', ')"
          foreach ($plat in 'x64', 'ARM64') {
            foreach ($tier in $tiers) {
              Write-Host "::group::Release | $plat | VoidDisplay IddTier=$tier"
              msbuild void-display\VoidDisplay.vcxproj /m `
                /p:Configuration=Release `
                /p:Platform=$plat `
                /p:IddTier=$tier `
                /p:SpectreMitigation=false `
                /p:SignMode=Off `
                /p:EnableInfVerif=false `
                /p:RunApiValidator=false `
                /v:minimal /nologo
              if ($LASTEXITCODE -ne 0) {
                Write-Host "::error::Build failed: Release $plat VoidDisplay IddTier=$tier"
                $failed += "Release/$plat/Idd$tier"
              }
              Write-Host "::endgroup::"
            }
          }
          if ($failed.Count -gt 0) { throw ("Tier builds failed:`n" + ($failed -join "`n")) }

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: void-binaries
          path: |
            void-display/**/*.dll
            void-display/**/VoidDisplay/**
            void-input/**/*.dll
            void-input/**/VoidInput/**
            voidctl/**/Release/voidctl.exe
          if-no-files-found: warn
